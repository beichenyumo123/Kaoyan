
spring.application.name=Kaoyan
# ?????
spring.datasource.url=jdbc:mysql://localhost:3306/kaoyan_forum?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis??
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.zzu.kaoyan.module.post.entity
mybatis.configuration.map-underscore-to-camel-case=true

# Swagger + OpenAPI ??????????
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.openapi-31.enabled=false

# ?????
server.port=8081

# ============================================================
# AI 模拟面试 Mock 模式开关
# true  = 使用 Mock 数据（不消耗 API 费用，适合开发调试）
# false = 调用真实 DeepSeek API（需先填写 DeepSeekConfig 中的 API_URL 和 API_KEY）
# ============================================================
interview.ai.mock=true


