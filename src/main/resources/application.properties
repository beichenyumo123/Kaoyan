
spring.application.name=Kaoyan
# ?????
spring.datasource.url=jdbc:mysql://localhost:3306/kaoyan_forum?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=db886
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis??
mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml, classpath*:com/zzu/kaoyan/mapper/**/*.xml
mybatis-plus.type-aliases-package=com.zzu.kaoyan.module.post.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true

logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=TRACE
# Swagger + OpenAPI ??????????
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.openapi-31.enabled=false

# ?????
server.port=8081

# ===== Redis ?? =====
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.database=0
spring.data.redis.timeout=5000ms
spring.data.redis.connect-timeout=3000ms

# Lettuce ????
spring.data.redis.lettuce.pool.max-active=16
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=2000ms

# ===== 文件上传配置 =====
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
app.upload.path=./uploads
app.upload.image.max-size=10485760
app.upload.video.max-size=104857600

# ===== DeepSeek AI 配置 =====
ai.api.endpoint=https://api.deepseek.com/chat/completions
ai.api.key=sk-your-deepseek-key
ai.api.model=deepseek-chat

