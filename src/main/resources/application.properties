
spring.application.name=Kaoyan
# ?????
spring.datasource.url=jdbc:mysql://localhost:3306/kaoyan_forum?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=db886
spring.datasource.driver-class-na2me=com.mysql.cj.jdbc.Driver

# MyBatis??
mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml, classpath*:com/zzu/kaoyan/mapper/**/*.xml
mybatis-plus.type-aliases-package=com.zzu.kaoyan.module.post.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true

logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=TRACE
# Swagger + OpenAPI ??????????
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.openapi-31.enabled=false

# ?????
server.port=8080

# ===== Redis 配置 =====
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.database=0
spring.data.redis.timeout=5000ms
spring.data.redis.connect-timeout=3000ms

# Lettuce 连接池
spring.data.redis.lettuce.pool.max-active=16
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=2000ms

# ===== 文件上传配置 =====
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
app.upload.path=./uploads
app.upload.image.max-size=10485760
app.upload.video.max-size=104857600

# ============================================================
# AI 模拟面试配置
# ============================================================
# Mock 模式开关：true=Mock数据(开发调试), false=真实千问API(需先填写api-key)
interview.ai.mock=false

# 通义千问 DashScope API 配置（OpenAI 兼容模式）
# 注册获取 API Key: https://dashscope.console.aliyun.com/
# 模型选择: qwen-plus(推荐,性价比高) / qwen-max(最强) / qwen-turbo(最快/最便宜)
interview.ai.qwen.api-url=https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
interview.ai.qwen.api-key=${INTERVIEW_API:}
# interview.ai.qwen.model 在 QwenConfig 中默认为 qwen-plus

# ===== Spring MVC 配置 =====
# 禁止将未匹配的请求当作静态资源处理
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false
# ===== AI 配置（通义千问 DashScope，兼容 OpenAI 协议） =====

ai.api.endpoint=https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
ai.api.key=${DASHSCOPE_API_KEY:}
ai.api.model=qwen3.5-omni-flash

