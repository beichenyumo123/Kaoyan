# ──────────────────────────────────────────────
# 开发环境配置 (spring.profiles.active=dev)
# ──────────────────────────────────────────────
# 启动方式：
#   IDEA: VM options 添加 -Dspring.profiles.active=dev
#   命令行: java -jar kaoyan.jar --spring.profiles.active=dev
#
# 本 profile 激活后会：
#   1. TestDataInitializer 自动重置测试账号 (test@kaoyan.com / test123456)
#   2. 种子 AI Agent 相关测试数据（任务、会话、干预、周报等）
#   3. 清除 Redis 配额缓存

logging:
  level:
    com.zzu.kaoyan: DEBUG

# 开发环境日志格式（方便调试）
debug: false
